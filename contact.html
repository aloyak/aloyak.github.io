<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/92647999?v=4" />
    <title>4loyak!</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body class="min-h-screen text-ink">
    <div class="page-noise"></div>
    <main class="max-w-3xl mx-auto px-6 py-12">
      <header class="mb-14 flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
        <h1 class="text-3xl md:text-4xl title-font">
          <a href="/">4loyak!</a>
        </h1>
        <nav class="flex flex-wrap gap-3 items-center text-sm md:text-base">
          <a class="neo-btn neo-btn-success" href="/">Back</a>
          <a class="neo-btn neo-btn-error" href="https://github.com/aloyak">GitHub</a>
          <label class="flex items-center gap-2 font-bold cursor-pointer ml-2">
            <input id="dark-mode-toggle" type="checkbox" class="neo-checkbox" />
            <span class="text-base">Dark</span>
          </label>
        </nav>
      </header>

      <section class="neo-card relative mt-12">
        <h2 class="text-2xl title-font bg-[#ff9d7b] text-black inline-block px-4 py-2 border-[4px] border-black rounded shadow-[4px_4px_0px_#000] absolute -top-6 left-6">Contact</h2>

        <p class="text-lg font-bold leading-relaxed max-w-xl mt-10">
          Want to say hi, share a project idea, or ask a question? Fill out the form below or reach out via email at <a href="mailto:almartdev@proton.me" class="underline hover:text-[#7da5ff] transition-colors">almartdev@proton.me</a>
        </p>
        
        <form class="mt-10 space-y-8 font-bold text-lg" method="POST" action="https://formspree.io/f/xojnegao">
          <div>
            <label class="block mb-3" for="email">Email <span class="text-red-500">*</span></label>
            <input
              class="neo-input"
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <div>
            <label class="block mb-3" for="title">Title <span class="text-red-500">*</span></label>
            <input
              class="neo-input"
              id="title"
              name="title"
              type="text"
              placeholder="Project idea, question, hello"
              required
            />
          </div>
          <div>
            <label class="block mb-3" for="content">Content <span class="text-red-500">*</span></label>
            <textarea
              class="neo-input min-h-[200px] resize-y"
              id="content"
              name="content"
              rows="6"
              placeholder="Share a few details..."
              required
            ></textarea>
          </div>
          <button class="neo-btn neo-btn-primary w-full md:w-auto text-xl mt-4 px-8 py-3" type="submit">Send!</button>
        </form>
      </section>
    </main>
  </body>
</html>
